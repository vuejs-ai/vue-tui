packages:
  - apps/*
  - packages/*
  - tools/*
  - examples/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: ^0.1.22
  "@vitejs/plugin-vue-jsx": ^5.1.5
  chalk: ^5.6.2
  strip-ansi: ^7.2.0
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
