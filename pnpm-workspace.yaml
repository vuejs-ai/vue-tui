packages:
  - apps/*
  - packages/*
  - tools/*
  - examples/*

catalogMode: prefer

catalog:
  "@alcalzone/ansi-tokenize": ^0.3.0
  ansi-escapes: ^7.3.0
  "@types/node": ^24.12.4
  typescript: ^5
  # vite: npm:@voidzero-dev/vite-plus-core@latest # Vite+ engine (disabled; on vanilla vite)
  vite: 8.1.0
  vitest: ^4.1.5
  vite-plus: ^0.1.22
  "@vitejs/plugin-vue-jsx": ^5.1.5
  chalk: ^5.6.2
  is-in-ci: ^2.0.0
  patch-console: ^2.0.0
  strip-ansi: ^7.2.0
  node-pty: 1.2.0-beta.13
  terminal-size: ^4.0.1
  tsx: ^4.22.0
  string-width: ^8.0.0
  unplugin-vue: ^7.2.0
  vue-tsc: ^3.3.4
overrides:
  # Pin vite's version spec tree-wide (incl. third-party peer ranges) to the catalog version.
  # "catalog:" tracks catalog.vite — vanilla 8.1.0 now, NOT Vite+ core (core is the commented
  # catalog line above). This is the canonical Vite+ override pattern, just pointed at vanilla.
  vite: "catalog:"
  # Keep @types/node single too, for stable types across the workspace.
  "@types/node": "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  esbuild: true
  node-pty: true
